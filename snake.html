<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #071a0f, #0d2818, #071a0f);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* 홈 버튼 */
#home-btn {
  position: fixed;
  top: 18px; left: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 8px 14px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}
#home-btn:hover { background: rgba(255,255,255,0.15); color: white; }

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

/* 헤더 */
#header {
  display: flex;
  align-items: center;
  gap: 24px;
}
.hud-box {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 8px 20px;
  text-align: center;
  min-width: 90px;
}
.hud-label { font-size: 10px; color: #7bed9f; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.hud-val   { font-size: 22px; font-weight: 800; }

/* 캔버스 */
#canvas-wrap {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 0 2px rgba(123,237,159,0.2), 0 20px 60px rgba(0,0,0,0.5);
}
canvas { display: block; }

/* 조작 힌트 */
#hint {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.5px;
}

/* 오버레이 */
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  backdrop-filter: blur(4px);
}
#ov-emoji { font-size: 56px; }
#ov-title { font-size: 24px; font-weight: 800; }
#ov-sub   { font-size: 14px; color: rgba(255,255,255,0.5); }
#ov-btn {
  margin-top: 8px;
  background: linear-gradient(135deg, #2ed573, #1abc9c);
  color: white;
  border: none;
  padding: 12px 36px;
  border-radius: 99px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(46,213,115,0.35);
  transition: transform 0.15s;
}
#ov-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<a id="home-btn" href="index.html">← 홈</a>

<div id="app">
  <div id="header">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score">0</div>
    </div>
    <div style="font-size:32px;">🐍</div>
    <div class="hud-box">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="best">0</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="ov-emoji">🐍</div>
      <div id="ov-title">Snake</div>
      <div id="ov-sub">방향키 또는 WASD로 조종하세요</div>
      <button id="ov-btn" onclick="startGame()">시작하기</button>
    </div>
  </div>

  <div id="hint">↑ ↓ ← → 또는 W A S D</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const CELL   = 20;
const COLS   = canvas.width  / CELL;
const ROWS   = canvas.height / CELL;

let snake, dir, nextDir, food, bonus, score, best, loop, speed;
let state = 'idle'; // idle | playing | dead

best = parseInt(localStorage.getItem('best_snake') || '0');
document.getElementById('best').textContent = best;

const COLORS = {
  bg:     '#071a0f',
  grid:   'rgba(123,237,159,0.04)',
  head:   '#2ed573',
  body:   '#1abc9c',
  tail:   '#17a085',
  food:   '#ffd32a',
  bonus:  '#ff4757',
  glow:   'rgba(46,213,115,0.6)',
};

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  snake   = [{ x: 10, y: 10 }];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score   = 0;
  speed   = 120;
  bonus   = null;
  bonusTimer = 0;
  state   = 'playing';
  document.getElementById('score').textContent = '0';
  spawnFood();
  clearInterval(loop);
  loop = setInterval(tick, speed);
}

let bonusTimer = 0;

function spawnFood() {
  food = randEmpty();
}
function spawnBonus() {
  bonus = randEmpty();
  bonusTimer = 60; // ticks
}

function randEmpty() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function tick() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 벽 충돌
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
  // 자기 충돌
  if (snake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }

  snake.unshift(head);

  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    ate = true;
    spawnFood();
    if (score % 50 === 0) spawnBonus();
    // 속도 증가
    if (score % 40 === 0 && speed > 60) {
      speed -= 10;
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
  }
  if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 30;
    ate = true;
    bonus = null;
  }
  if (!ate) snake.pop();

  if (bonusTimer > 0) { bonusTimer--; if (bonusTimer === 0) bonus = null; }

  document.getElementById('score').textContent = score;
  draw();
}

function die() {
  clearInterval(loop);
  state = 'dead';
  if (score > best) {
    best = score;
    localStorage.setItem('best_snake', best);
    document.getElementById('best').textContent = best;
  }
  // 죽음 애니메이션
  deathAnim(0);
}

function deathAnim(frame) {
  if (frame < 8) {
    ctx.fillStyle = frame % 2 === 0 ? 'rgba(255,71,87,0.3)' : 'transparent';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    draw();
    setTimeout(() => deathAnim(frame + 1), 60);
  } else {
    showOverlay('😵', '게임 오버', `점수: ${score}점`, '다시 하기');
  }
}

function showOverlay(emoji, title, sub, btn) {
  const ov = document.getElementById('overlay');
  document.getElementById('ov-emoji').textContent = emoji;
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-sub').textContent   = sub;
  document.getElementById('ov-btn').textContent   = btn;
  ov.style.display = 'flex';
}

function draw() {
  // 배경
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 그리드
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth   = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  // 먹이 글로우
  ctx.save();
  ctx.shadowColor = COLORS.food;
  ctx.shadowBlur  = 14;
  ctx.font = `${CELL+2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍎', food.x * CELL + CELL/2, food.y * CELL + CELL/2);
  ctx.restore();

  // 보너스
  if (bonus) {
    ctx.save();
    ctx.shadowColor = COLORS.bonus;
    ctx.shadowBlur  = 18;
    ctx.font = `${CELL+2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', bonus.x * CELL + CELL/2, bonus.y * CELL + CELL/2);
    ctx.restore();
  }

  // 뱀 몸통
  for (let i = snake.length - 1; i > 0; i--) {
    const t = i / snake.length;
    ctx.fillStyle = lerpColor(COLORS.tail, COLORS.body, 1 - t);
    roundRect(snake[i].x * CELL + 1, snake[i].y * CELL + 1, CELL - 2, CELL - 2, 5);
  }

  // 뱀 머리
  if (snake.length > 0) {
    ctx.save();
    ctx.shadowColor = COLORS.glow;
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = COLORS.head;
    roundRect(snake[0].x * CELL + 1, snake[0].y * CELL + 1, CELL - 2, CELL - 2, 6);
    ctx.restore();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function lerpColor(a, b, t) {
  const ah = a.replace('#',''), bh = b.replace('#','');
  const ar = parseInt(ah.slice(0,2),16), ag = parseInt(ah.slice(2,4),16), ab = parseInt(ah.slice(4,6),16);
  const br = parseInt(bh.slice(0,2),16), bg = parseInt(bh.slice(2,4),16), bb = parseInt(bh.slice(4,6),16);
  const rr = Math.round(ar+(br-ar)*t), rg = Math.round(ag+(bg-ag)*t), rb = Math.round(ab+(bb-ab)*t);
  return `rgb(${rr},${rg},${rb})`;
}

// ─── 키보드 ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (state !== 'playing') return;
  const map = {
    ArrowUp:    { x:0,  y:-1 }, w: { x:0,  y:-1 }, W: { x:0,  y:-1 },
    ArrowDown:  { x:0,  y:1  }, s: { x:0,  y:1  }, S: { x:0,  y:1  },
    ArrowLeft:  { x:-1, y:0  }, a: { x:-1, y:0  }, A: { x:-1, y:0  },
    ArrowRight: { x:1,  y:0  }, d: { x:1,  y:0  }, D: { x:1,  y:0  },
  };
  const d = map[e.key];
  if (!d) return;
  if (d.x === -dir.x && d.y === -dir.y) return; // 반대 방향 금지
  nextDir = d;
  e.preventDefault();
});

// 초기 그리기
draw();
</script>
</body>
</html>
