<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg,#1a1200,#2d1f00,#1a1200);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  font-family:'Segoe UI',sans-serif;
  color:white;
  user-select:none;
}
#home-btn {
  position:fixed; top:18px; left:18px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; padding:8px 14px;
  color:rgba(255,255,255,0.6); font-size:13px;
  text-decoration:none; transition:all 0.2s; backdrop-filter:blur(4px); z-index:9000;
}
#home-btn:hover { background:rgba(255,255,255,0.15); color:white; }

#app { display:flex; flex-direction:column; align-items:center; gap:14px; }

/* 헤더 */
#header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; }
.hud {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; padding:8px 20px; text-align:center; min-width:80px;
}
.hud-label { font-size:10px; color:#ffd32a; letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
.hud-val { font-size:22px; font-weight:800; }
#new-btn {
  background:linear-gradient(135deg,#ffd32a,#e6b800);
  color:#1a1200; border:none; border-radius:12px;
  padding:10px 22px; font-size:14px; font-weight:800;
  cursor:pointer; transition:transform 0.15s;
}
#new-btn:hover { transform:scale(1.05); }

/* 보드 */
#board-wrap {
  background:rgba(255,211,32,0.1);
  border:2px solid rgba(255,211,32,0.2);
  border-radius:16px; padding:10px;
  box-shadow:0 0 40px rgba(255,211,32,0.08);
}
#board {
  display:grid; grid-template-columns:repeat(4,90px);
  gap:8px;
}
.cell {
  width:90px; height:90px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; transition:background 0.1s;
  position:relative;
}
.cell-bg { background:rgba(255,255,255,0.05); }

.tile {
  position:absolute; inset:0;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-weight:900;
  animation:pop 0.12s ease;
}
@keyframes pop { 0%{transform:scale(0.8);} 60%{transform:scale(1.08);} 100%{transform:scale(1);} }
.tile.merged { animation:merge 0.15s ease; }
@keyframes merge { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }

/* 타일 색상 */
.t2    { background:#fff3cc; color:#776e65; font-size:36px; }
.t4    { background:#ffe599; color:#776e65; font-size:36px; }
.t8    { background:#ffb347; color:white;   font-size:34px; }
.t16   { background:#ff8c42; color:white;   font-size:32px; }
.t32   { background:#ff6347; color:white;   font-size:32px; }
.t64   { background:#e84393; color:white;   font-size:30px; }
.t128  { background:#a29bfe; color:white;   font-size:26px; box-shadow:0 0 12px rgba(162,155,254,0.5); }
.t256  { background:#7c6ef5; color:white;   font-size:24px; box-shadow:0 0 16px rgba(124,110,245,0.5); }
.t512  { background:#5352ed; color:white;   font-size:24px; box-shadow:0 0 20px rgba(83,82,237,0.6); }
.t1024 { background:#00d2ff; color:white;   font-size:20px; box-shadow:0 0 24px rgba(0,210,255,0.6); }
.t2048 { background:linear-gradient(135deg,#ffd32a,#ff6347); color:white; font-size:20px; box-shadow:0 0 32px rgba(255,211,32,0.7); }
.tbig  { background:linear-gradient(135deg,#7c6ef5,#00d2ff); color:white; font-size:16px; box-shadow:0 0 32px rgba(124,110,245,0.7); }

#hint { font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:0.5px; }

/* 오버레이 */
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  display:flex; align-items:center; justify-content:center;
  z-index:9999; backdrop-filter:blur(4px);
}
#ov-card {
  background:linear-gradient(135deg,#1a1200,#2d1f00);
  border:1px solid rgba(255,211,32,0.2); border-radius:28px;
  padding:44px 48px; text-align:center; color:white; min-width:280px;
}
#ov-emoji { font-size:60px; margin-bottom:12px; }
#ov-title { font-size:24px; font-weight:800; margin-bottom:8px; }
#ov-sub   { font-size:15px; color:rgba(255,255,255,0.5); margin-bottom:28px; }
#ov-btn {
  background:linear-gradient(135deg,#ffd32a,#e6b800);
  color:#1a1200; border:none; padding:14px 44px; border-radius:99px;
  font-size:17px; font-weight:700; cursor:pointer; transition:transform 0.15s;
}
#ov-btn:hover { transform:scale(1.05); }
</style>
</head>
<body>
<a id="home-btn" href="index.html">← 홈</a>

<div id="overlay">
  <div id="ov-card">
    <div id="ov-emoji">🔢</div>
    <div id="ov-title">2048</div>
    <div id="ov-sub">같은 숫자를 합쳐 2048을 만드세요!</div>
    <button id="ov-btn" onclick="newGame()">시작하기</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="hud"><div class="hud-label">Score</div><div class="hud-val" id="score">0</div></div>
    <div class="hud"><div class="hud-label">Best</div><div class="hud-val" id="best">0</div></div>
    <button id="new-btn" onclick="newGame()">새 게임</button>
  </div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="hint">← → ↑ ↓ 또는 스와이프</div>
</div>

<script>
let grid, score, best, moved;
best = parseInt(localStorage.getItem('best_2048')||'0');
document.getElementById('best').textContent = best;

const SIZE = 4;
const COLORS = {2:'t2',4:'t4',8:'t8',16:'t16',32:'t32',64:'t64',128:'t128',256:'t256',512:'t512',1024:'t1024',2048:'t2048'};

function newGame() {
  document.getElementById('overlay').style.display='none';
  grid = Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score = 0;
  document.getElementById('score').textContent = 0;
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empty=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function render() {
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    const cell=document.createElement('div');
    cell.className='cell cell-bg';
    const v=grid[r][c];
    if(v) {
      const tile=document.createElement('div');
      const cls=COLORS[v]||(v>2048?'tbig':'t2048');
      tile.className=`tile ${cls}`;
      tile.textContent=v;
      cell.appendChild(tile);
    }
    board.appendChild(cell);
  }
}

function slide(row) {
  let arr=row.filter(v=>v), gained=0, result=[], merged=false;
  while(arr.length) {
    if(!merged && arr.length>=2 && arr[0]===arr[1]) {
      result.push(arr[0]*2); gained+=arr[0]*2; arr.splice(0,2); merged=false;
    } else { result.push(arr.shift()); merged=false; }
  }
  while(result.length<SIZE) result.push(0);
  return {row:result,gained};
}

function move(dir) {
  let total=0, changed=false;
  if(dir==='left')  for(let r=0;r<SIZE;r++){const{row,gained}=slide(grid[r]);if(row.join()!==grid[r].join()){changed=true;grid[r]=row;total+=gained;}}
  if(dir==='right') for(let r=0;r<SIZE;r++){const rev=grid[r].slice().reverse();const{row,gained}=slide(rev);const back=row.reverse();if(back.join()!==grid[r].join()){changed=true;grid[r]=back;total+=gained;}}
  if(dir==='up')    for(let c=0;c<SIZE;c++){const col=grid.map(r=>r[c]);const{row,gained}=slide(col);if(row.join()!==col.join()){changed=true;row.forEach((v,r)=>grid[r][c]=v);total+=gained;}}
  if(dir==='down')  for(let c=0;c<SIZE;c++){const col=grid.map(r=>r[c]).reverse();const{row,gained}=slide(col);const back=row.reverse();if(back.join()!==col.join()){changed=true;back.forEach((v,r)=>grid[r][c]=v);total+=gained;}}
  if(!changed) return;
  score+=total;
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('best_2048',best);document.getElementById('best').textContent=best;}
  addRandom(); render();
  if(isWin()) setTimeout(()=>showEnd('🎉','2048 달성!',`점수: ${score}`),200);
  else if(isLose()) setTimeout(()=>showEnd('😢','게임 오버',`최종 점수: ${score}`),200);
}

function isWin()  { return grid.flat().some(v=>v>=2048); }
function isLose() {
  if(grid.flat().some(v=>!v)) return false;
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    if(c<SIZE-1&&grid[r][c]===grid[r][c+1]) return false;
    if(r<SIZE-1&&grid[r][c]===grid[r+1][c]) return false;
  }
  return true;
}

function showEnd(emoji,title,sub) {
  document.getElementById('ov-emoji').textContent=emoji;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-sub').textContent=sub;
  document.getElementById('ov-btn').textContent='다시 하기';
  document.getElementById('overlay').style.display='flex';
}

// 키보드
document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){move(map[e.key]);e.preventDefault();}
});

// 터치 스와이프
let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});
</script>
</body>
</html>
