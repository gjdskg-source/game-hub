<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Memory Cards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #0a0018, #1a0a2e, #0a0018);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

#home-btn {
  position: fixed;
  top: 18px; left: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 8px 14px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}
#home-btn:hover { background: rgba(255,255,255,0.15); color: white; }

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 20px;
}

/* 헤더 */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.hud-box {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 8px 20px;
  text-align: center;
  min-width: 80px;
}
.hud-label { font-size: 10px; color: #fd79a8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.hud-val   { font-size: 22px; font-weight: 800; }

/* 레벨 선택 */
#level-row {
  display: flex;
  gap: 8px;
}
.lv-btn {
  padding: 7px 16px;
  border-radius: 99px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.lv-btn:hover { border-color: rgba(255,121,168,0.5); color: white; }
.lv-btn.active {
  background: linear-gradient(135deg, #fd79a8, #e84393);
  border-color: transparent;
  color: white;
}

/* 카드 그리드 */
#board {
  display: grid;
  gap: 10px;
}

/* 카드 */
.card {
  perspective: 800px;
  cursor: pointer;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 14px;
}
.card.flipped .card-inner  { transform: rotateY(180deg); }
.card.matched .card-inner  { transform: rotateY(180deg); }
.card.matched .card-front  {
  box-shadow: 0 0 20px rgba(253,121,168,0.5);
  border-color: rgba(253,121,168,0.6);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.card-back {
  background: linear-gradient(135deg, #2d1b69, #1a0a2e);
  border: 2px solid rgba(124,110,245,0.3);
  font-size: 24px;
}
.card-front {
  background: linear-gradient(135deg, #1a0a2e, #2d1b69);
  border: 2px solid rgba(253,121,168,0.3);
  transform: rotateY(180deg);
}

/* 카드 뒤 패턴 */
.card-back::before {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 10px;
  background: repeating-linear-gradient(
    45deg,
    rgba(124,110,245,0.08) 0px,
    rgba(124,110,245,0.08) 2px,
    transparent 2px,
    transparent 8px
  );
}
.card-back-icon {
  font-size: 20px;
  position: relative;
  z-index: 1;
  opacity: 0.5;
}

/* 맞춤 애니메이션 */
.card.matched .card-front {
  animation: matchPulse 0.5s ease;
}
@keyframes matchPulse {
  0%   { transform: rotateY(180deg) scale(1); }
  40%  { transform: rotateY(180deg) scale(1.08); }
  100% { transform: rotateY(180deg) scale(1); }
}

/* 타이머 바 */
#timer-wrap {
  width: 100%;
  max-width: 440px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  overflow: hidden;
}
#timer-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 1s linear, background 1s;
  background: linear-gradient(90deg, #fd79a8, #e84393);
}

/* 오버레이 */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}
#ov-card {
  background: linear-gradient(135deg, #1a0a2e, #0a0018);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 28px;
  padding: 44px 48px;
  text-align: center;
  color: white;
  min-width: 300px;
}
#ov-emoji { font-size: 60px; margin-bottom: 12px; }
#ov-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
#ov-sub   { font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 28px; line-height: 1.6; }
#ov-btn {
  background: linear-gradient(135deg, #fd79a8, #e84393);
  color: white;
  border: none;
  padding: 14px 44px;
  border-radius: 99px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 4px 20px rgba(253,121,168,0.35);
}
#ov-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<a id="home-btn" href="index.html">← 홈</a>

<div id="overlay">
  <div id="ov-card">
    <div id="ov-emoji">🃏</div>
    <div id="ov-title">Memory Cards</div>
    <div id="ov-sub">카드를 뒤집어 짝을 찾으세요<br>더 빠를수록 높은 점수!</div>
    <button id="ov-btn" onclick="startGame()">시작하기</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score-val">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Moves</div>
      <div class="hud-val" id="moves-val">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Time</div>
      <div class="hud-val" id="time-val">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="best-val">—</div>
    </div>
  </div>

  <div id="level-row">
    <button class="lv-btn active" onclick="setLevel(4, this)">4×4</button>
    <button class="lv-btn" onclick="setLevel(5, this)">5×5 (어려움)</button>
  </div>

  <div id="timer-wrap">
    <div id="timer-fill" style="width:100%"></div>
  </div>

  <div id="board"></div>
</div>

<script>
const EMOJIS = [
  '🍎','🍊','🍋','🍇','🍓','🫐','🍑','🥝',
  '🌸','⭐','🔮','🦋','🐱','🐶','🌈','🎸',
  '🍕','🎯','🚀','🌺','🦊','🐬','🎩','🍄',
  '🏆','💎','🎪','🦄'
];

let gridSize   = 4;
let cards      = [];
let flipped    = [];
let matched    = 0;
let moves      = 0;
let score      = 0;
let startTime  = null;
let timerInv   = null;
let timeLimit  = 90; // 초
let elapsed    = 0;
let busy       = false;
let gameActive = false;
let best       = parseInt(localStorage.getItem('best_memory') || '0');

document.getElementById('best-val').textContent = best || '—';

function setLevel(size, btn) {
  gridSize = size;
  timeLimit = size === 4 ? 90 : 150;
  document.querySelectorAll('.lv-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  moves = 0; score = 0; matched = 0; flipped = []; elapsed = 0; busy = false;
  gameActive = true;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('moves-val').textContent = '0';
  document.getElementById('time-val').textContent  = '0';
  document.getElementById('timer-fill').style.width = '100%';
  document.getElementById('timer-fill').style.background = 'linear-gradient(90deg,#fd79a8,#e84393)';
  clearInterval(timerInv);
  buildBoard();
  startTime = Date.now();
  timerInv = setInterval(tick, 200);
}

function buildBoard() {
  const board = document.getElementById('board');
  const total = gridSize * gridSize;
  const pairs = total / 2;
  const pool  = EMOJIS.slice(0, pairs);
  const all   = [...pool, ...pool];
  // 셔플
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [all[i], all[j]] = [all[j], all[i]];
  }

  const cSize = gridSize === 4 ? 88 : 72;
  board.style.gridTemplateColumns = `repeat(${gridSize}, ${cSize}px)`;
  board.innerHTML = '';
  cards = [];

  all.forEach((emoji, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.width  = cSize + 'px';
    card.style.height = cSize + 'px';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="card-back-icon">✦</div>
        </div>
        <div class="card-face card-front" style="font-size:${cSize*0.45}px">${emoji}</div>
      </div>`;
    card.addEventListener('click', () => onCardClick(idx));
    board.appendChild(card);
    cards.push({ el: card, emoji, matched: false });
  });
}

function onCardClick(idx) {
  if (!gameActive || busy) return;
  const card = cards[idx];
  if (card.matched || card.el.classList.contains('flipped')) return;
  if (flipped.length >= 2) return;

  card.el.classList.add('flipped');
  flipped.push(idx);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves-val').textContent = moves;
    busy = true;
    const [a, b] = flipped;
    if (cards[a].emoji === cards[b].emoji) {
      // 매치!
      setTimeout(() => {
        cards[a].el.classList.add('matched');
        cards[b].el.classList.add('matched');
        cards[a].matched = true;
        cards[b].matched = true;
        matched += 2;
        const bonus = Math.max(0, 30 - moves * 2 + Math.floor((timeLimit - elapsed) / 3));
        score += 20 + bonus;
        document.getElementById('score-val').textContent = score;
        flipped = [];
        busy = false;
        if (matched === cards.length) setTimeout(showWin, 300);
      }, 300);
    } else {
      setTimeout(() => {
        cards[a].el.classList.remove('flipped');
        cards[b].el.classList.remove('flipped');
        flipped = [];
        busy = false;
      }, 900);
    }
  }
}

function tick() {
  elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('time-val').textContent = elapsed + 's';
  const pct = Math.max(0, (timeLimit - elapsed) / timeLimit * 100);
  document.getElementById('timer-fill').style.width = pct + '%';
  if (pct < 30) document.getElementById('timer-fill').style.background = 'linear-gradient(90deg,#ff4757,#ff6348)';
  else if (pct < 60) document.getElementById('timer-fill').style.background = 'linear-gradient(90deg,#ffa502,#ff6348)';
  if (elapsed >= timeLimit) {
    clearInterval(timerInv);
    gameActive = false;
    showGameOver();
  }
}

function showWin() {
  clearInterval(timerInv);
  gameActive = false;
  const timeBonus = Math.max(0, timeLimit - elapsed) * 2;
  const moveBonus = Math.max(0, 200 - moves * 5);
  score += timeBonus + moveBonus;
  document.getElementById('score-val').textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('best_memory', best);
    document.getElementById('best-val').textContent = best;
  }
  document.getElementById('ov-emoji').textContent = '🎉';
  document.getElementById('ov-title').textContent = '클리어!';
  document.getElementById('ov-sub').textContent = `점수: ${score}점\n이동: ${moves}회 | 시간: ${elapsed}초`;
  document.getElementById('ov-btn').textContent = '다시 하기';
  document.getElementById('overlay').style.display = 'flex';
}

function showGameOver() {
  document.getElementById('ov-emoji').textContent = '⏰';
  document.getElementById('ov-title').textContent = '시간 초과!';
  document.getElementById('ov-sub').textContent = `점수: ${score}점 | 맞춘 쌍: ${matched/2}`;
  document.getElementById('ov-btn').textContent = '다시 하기';
  document.getElementById('overlay').style.display = 'flex';
}
</script>
</body>
</html>
