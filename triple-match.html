<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple Match 🎮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

#app {
  width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* Header */
#header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  padding: 0 4px;
}
#score-box {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 6px 18px;
  text-align: center;
}
#score-label { font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
#score-val { font-size: 26px; font-weight: 800; color: #ffd32a; }
#remain-box {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 6px 18px;
  text-align: center;
}
#remain-label { font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
#remain-val { font-size: 26px; font-weight: 800; color: #7bed9f; }

/* Progress */
#progress-wrap {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  height: 8px;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00d2ff, #7bed9f);
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

/* Board */
#board {
  width: 400px;
  height: 460px;
  position: relative;
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
}

/* Items */
.item {
  position: absolute;
  width: 58px;
  height: 58px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, filter 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
}
.item:not(.blocked):hover {
  transform: scale(1.12) translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
}
.item.blocked {
  filter: brightness(0.4) saturate(0.3);
  cursor: default;
}
.item.removing {
  animation: popOut 0.35s ease forwards;
}
@keyframes popOut {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.3); opacity: 0.9; }
  100% { transform: scale(0); opacity: 0; }
}

/* Tray */
#tray-wrap {
  width: 400px;
  background: rgba(255,255,255,0.07);
  border-radius: 18px;
  padding: 10px 12px;
  border: 1.5px solid rgba(255,255,255,0.15);
}
#tray-label {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
  text-align: center;
}
#tray-slots {
  display: flex;
  gap: 6px;
  justify-content: center;
}
.slot {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1.5px dashed rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.slot.filled {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
}
.slot.danger {
  border-color: rgba(255,71,87,0.8);
  background: rgba(255,71,87,0.15);
  animation: dangerPulse 0.8s ease infinite;
}
.slot.match-flash {
  animation: matchFlash 0.35s ease forwards;
}
@keyframes matchFlash {
  0%   { transform: scale(1); background: rgba(255,255,255,0.1); }
  40%  { transform: scale(1.2); background: rgba(255,215,0,0.4); }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes dangerPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
  50%       { box-shadow: 0 0 0 4px rgba(255,71,87,0.3); }
}
.slot.bounce-in {
  animation: bounceIn 0.25s ease;
}
@keyframes bounceIn {
  0%   { transform: scale(0.5); }
  70%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* Overlay */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}
#overlay-card {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 28px;
  padding: 44px 48px;
  text-align: center;
  color: white;
  min-width: 300px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#overlay-emoji { font-size: 64px; margin-bottom: 12px; }
#overlay-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
#overlay-sub { font-size: 15px; color: #aaa; margin-bottom: 28px; line-height: 1.6; }
#overlay-btn {
  background: linear-gradient(135deg, #00d2ff, #3a7bd5);
  color: white;
  border: none;
  padding: 14px 44px;
  border-radius: 99px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(0,210,255,0.3);
}
#overlay-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 28px rgba(0,210,255,0.5);
}

/* Particles */
.particle {
  position: fixed;
  pointer-events: none;
  font-size: 20px;
  z-index: 9998;
  animation: floatUp 0.8s ease forwards;
}
@keyframes floatUp {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-80px) scale(0.5); opacity: 0; }
}

#home-btn {
  position: fixed;
  top: 18px; left: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 8px 14px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
  z-index: 9000;
}
#home-btn:hover { background: rgba(255,255,255,0.15); color: white; }
</style>
</head>
<body>

<a id="home-btn" href="index.html">← 홈</a>

<div id="app">
  <div id="header">
    <div id="score-box">
      <div id="score-label">Score</div>
      <div id="score-val">0</div>
    </div>
    <div id="remain-box">
      <div id="remain-label">Remain</div>
      <div id="remain-val">—</div>
    </div>
  </div>

  <div id="progress-wrap">
    <div id="progress-fill"></div>
  </div>

  <div id="board"></div>

  <div id="tray-wrap">
    <div id="tray-label">Tray (7 slots)</div>
    <div id="tray-slots"></div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-card">
    <div id="overlay-emoji">🎮</div>
    <div id="overlay-title">Triple Match</div>
    <div id="overlay-sub">같은 아이템 3개를 모아 없애세요!<br>트레이(7칸)가 꽉 차면 게임 오버 💫</div>
    <button id="overlay-btn" onclick="startGame()">시작하기</button>
  </div>
</div>

<script>
// ─── 상수 ───────────────────────────────────────────────────────────
const ITEMS_DEF = [
  { emoji: '🍎', color: '#ff4757' },
  { emoji: '🍊', color: '#ffa502' },
  { emoji: '🍋', color: '#ffd32a' },
  { emoji: '🍇', color: '#a29bfe' },
  { emoji: '🍓', color: '#fd79a8' },
  { emoji: '🫐', color: '#6c5ce7' },
  { emoji: '🍑', color: '#e17055' },
  { emoji: '🥝', color: '#00b894' },
  { emoji: '🍄', color: '#d63031' },
  { emoji: '🌸', color: '#fd79a8' },
  { emoji: '⭐', color: '#fdcb6e' },
  { emoji: '🔮', color: '#74b9ff' },
];

const TRAY_MAX = 7;
const ITEM_W = 58, ITEM_H = 58;
const BOARD_W = 400, BOARD_H = 460;
const TOTAL_TYPES = 9;   // 타입 수
const EACH_COUNT = 6;    // 타입당 6개 (3쌍)
const LAYERS = 3;

// ─── 상태 ───────────────────────────────────────────────────────────
let items = [];
let tray = [];
let score = 0;
let totalItems = 0;
let busy = false;

// ─── 오디오 ─────────────────────────────────────────────────────────
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type = 'sine', vol = 0.15) {
  try {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playCollect() { beep(660, 0.08); }
function playMatch()   {
  beep(880, 0.06);
  setTimeout(() => beep(1100, 0.08), 60);
  setTimeout(() => beep(1320, 0.12), 120);
}
function playGameOver(){ beep(300, 0.3, 'sawtooth', 0.1); }
function playWin()     {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.15), i*80));
}

// ─── 게임 초기화 ─────────────────────────────────────────────────────
function startGame() {
  ctx.resume();
  document.getElementById('overlay').style.display = 'none';
  score = 0; tray = []; items = []; busy = false;
  document.getElementById('score-val').textContent = '0';
  buildItems();
  renderTray();
  updateProgress();
}

function buildItems() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  items = [];

  // 풀 생성
  const pool = [];
  const types = ITEMS_DEF.slice(0, TOTAL_TYPES);
  types.forEach(def => {
    for (let k = 0; k < EACH_COUNT; k++) pool.push({ ...def });
  });
  // 셔플
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  totalItems = pool.length;

  // 레이어별 배치
  const perLayer = Math.ceil(pool.length / LAYERS);
  pool.forEach((def, idx) => {
    const layer = Math.floor(idx / perLayer);
    const x = 8 + Math.random() * (BOARD_W - ITEM_W - 16);
    const y = 8 + Math.random() * (BOARD_H - ITEM_H - 16);

    const item = {
      id: idx,
      emoji: def.emoji,
      color: def.color,
      x, y,
      z: layer,
      blocked: false,
      gone: false,
      el: null
    };

    const el = document.createElement('div');
    el.className = 'item';
    el.style.cssText = `
      left:${x}px; top:${y}px;
      z-index:${layer * 20 + 10};
      background: ${def.color}25;
      border: 2px solid ${def.color}88;
    `;
    el.textContent = def.emoji;
    el.addEventListener('click', () => onItemClick(item));
    item.el = el;
    items.push(item);
    board.appendChild(el);
  });

  recomputeBlocked();
}

// ─── 블로킹 ──────────────────────────────────────────────────────────
function overlaps(a, b) {
  const gap = ITEM_W * 0.55;
  return Math.abs(a.x - b.x) < gap && Math.abs(a.y - b.y) < gap;
}

function recomputeBlocked() {
  const active = items.filter(i => !i.gone);
  active.forEach(a => {
    a.blocked = active.some(b => b.id !== a.id && b.z > a.z && overlaps(a, b));
    a.el.classList.toggle('blocked', a.blocked);
  });
}

// ─── 클릭 ────────────────────────────────────────────────────────────
function onItemClick(item) {
  if (busy || item.gone || item.blocked) return;
  if (tray.length >= TRAY_MAX) return;
  busy = true;

  playCollect();
  item.gone = true;
  item.el.style.display = 'none';
  recomputeBlocked();

  // 트레이 삽입 (같은 종류 옆에)
  insertToTray(item);
  renderTray();
  updateProgress();

  setTimeout(() => {
    checkMatch();
    busy = false;
  }, 200);
}

function insertToTray(item) {
  // 같은 emoji 마지막 위치 다음에 삽입
  let pos = tray.length;
  for (let i = tray.length - 1; i >= 0; i--) {
    if (tray[i].emoji === item.emoji) { pos = i + 1; break; }
  }
  tray.splice(pos, 0, item);
}

// ─── 매치 ────────────────────────────────────────────────────────────
function checkMatch() {
  for (let i = 0; i <= tray.length - 3; i++) {
    if (tray[i].emoji === tray[i+1].emoji && tray[i+1].emoji === tray[i+2].emoji) {
      doMatch(i);
      return;
    }
  }
  if (tray.length >= TRAY_MAX) {
    setTimeout(showGameOver, 100);
  } else {
    checkWin();
  }
}

function doMatch(idx) {
  playMatch();
  const emoji = tray[idx].emoji;
  spawnParticles(emoji);

  // 플래시 애니메이션
  const slots = document.querySelectorAll('.slot');
  [idx, idx+1, idx+2].forEach(i => {
    if (slots[i]) {
      slots[i].classList.add('match-flash');
    }
  });

  setTimeout(() => {
    tray.splice(idx, 3);
    score += 30;
    document.getElementById('score-val').textContent = score;
    renderTray();
    updateProgress();
    checkWin();
  }, 350);
}

// ─── 파티클 ─────────────────────────────────────────────────────────
function spawnParticles(emoji) {
  const trayEl = document.getElementById('tray-wrap');
  const rect = trayEl.getBoundingClientRect();
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emoji;
    p.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*80) + 'px';
    p.style.top  = (rect.top  + rect.height/2 + (Math.random()-0.5)*30) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// ─── 렌더 트레이 ─────────────────────────────────────────────────────
function renderTray() {
  const wrap = document.getElementById('tray-slots');
  wrap.innerHTML = '';
  const danger = tray.length >= 5;

  for (let i = 0; i < TRAY_MAX; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot';
    if (i < tray.length) {
      slot.classList.add('filled');
      if (danger) slot.classList.add('danger');
      slot.textContent = tray[i].emoji;
      slot.classList.add('bounce-in');
    }
    wrap.appendChild(slot);
  }
}

// ─── 진행도 ──────────────────────────────────────────────────────────
function updateProgress() {
  const gone = items.filter(i => i.gone).length;
  document.getElementById('remain-val').textContent = totalItems - gone - tray.length;
  const pct = ((gone + tray.length) / totalItems) * 100;
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
}

// ─── 승패 ────────────────────────────────────────────────────────────
function checkWin() {
  const remaining = items.filter(i => !i.gone).length;
  if (remaining === 0 && tray.length === 0) {
    setTimeout(showWin, 200);
  }
}

function showWin() {
  playWin();
  document.getElementById('overlay-emoji').textContent = '🎉';
  document.getElementById('overlay-title').textContent = '클리어!';
  document.getElementById('overlay-sub').textContent = `최종 점수: ${score}점\n모든 아이템을 없앴어요!`;
  document.getElementById('overlay-btn').textContent = '다시 하기';
  document.getElementById('overlay').style.display = 'flex';
}

function showGameOver() {
  playGameOver();
  document.getElementById('overlay-emoji').textContent = '😢';
  document.getElementById('overlay-title').textContent = '게임 오버';
  document.getElementById('overlay-sub').textContent = `트레이가 꽉 찼어요!\n점수: ${score}점`;
  document.getElementById('overlay-btn').textContent = '다시 하기';
  document.getElementById('overlay').style.display = 'flex';
}
</script>
</body>
</html>
