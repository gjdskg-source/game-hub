<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Brick Breaker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:linear-gradient(135deg,#0a001a,#12002e,#0a001a);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}
#home-btn {
  position:fixed; top:18px; left:18px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; padding:8px 14px;
  color:rgba(255,255,255,0.6); font-size:13px;
  text-decoration:none; transition:all 0.2s; backdrop-filter:blur(4px); z-index:9000;
}
#home-btn:hover { background:rgba(255,255,255,0.15); color:white; }
#wrap { position:relative; }
canvas { display:block; border-radius:20px; box-shadow:0 0 60px rgba(180,0,255,0.2), 0 20px 60px rgba(0,0,0,0.6); }
#hud {
  position:absolute; top:14px; left:0; right:0;
  display:flex; justify-content:space-between; padding:0 18px;
  pointer-events:none;
}
.hud-pill {
  background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  border-radius:99px; padding:5px 14px;
  color:white; font-size:13px; font-weight:700;
  border:1px solid rgba(255,255,255,0.12);
}
.lives { color:#ff6b81; }

#overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.72); border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px);
}
#ov { text-align:center; color:white; }
#ov-emoji { font-size:60px; margin-bottom:10px; }
#ov-title { font-size:26px; font-weight:800; margin-bottom:6px; }
#ov-sub   { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:24px; line-height:1.6; }
#ov-btn {
  background:linear-gradient(135deg,#b400ff,#7c00e6);
  color:white; border:none; padding:13px 40px; border-radius:99px;
  font-size:16px; font-weight:700; cursor:pointer;
  box-shadow:0 4px 20px rgba(180,0,255,0.4); transition:transform 0.15s;
}
#ov-btn:hover { transform:scale(1.05); }
#ov-hint { margin-top:14px; font-size:12px; color:rgba(255,255,255,0.3); }
</style>
</head>
<body>
<a id="home-btn" href="index.html">← 홈</a>
<div id="wrap">
  <canvas id="c" width="400" height="580"></canvas>
  <div id="hud">
    <div class="hud-pill">점수 <span id="sc">0</span></div>
    <div class="hud-pill lives">❤️ <span id="lv">3</span></div>
    <div class="hud-pill">Lv <span id="lv2">1</span></div>
  </div>
  <div id="overlay">
    <div id="ov">
      <div id="ov-emoji">🧱</div>
      <div id="ov-title">Brick Breaker</div>
      <div id="ov-sub">모든 벽돌을 부수세요!</div>
      <button id="ov-btn" onclick="startGame()">시작하기</button>
      <div id="ov-hint">마우스 이동 또는 ← → 키</div>
    </div>
  </div>
</div>

<script>
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width, H = c.height;

// ── 상수 ──────────────────────────────
const PAD_W=90, PAD_H=12, PAD_Y=H-40;
const BALL_R=8;
const BRICK_ROWS=5, BRICK_COLS=8;
const BRICK_W=42, BRICK_H=18, BRICK_GAP=4;
const BRICK_OX=(W-(BRICK_COLS*(BRICK_W+BRICK_GAP)-BRICK_GAP))/2;
const BRICK_OY=70;

// 벽돌 색상 (행별)
const ROW_COLORS=['#ff4757','#ff6348','#ffa502','#7bed9f','#70a1ff'];
const ROW_PTS   =[50,40,30,20,10];

let pad, ball, bricks, score, best, lives, level, raf, state, launching;
best = parseInt(localStorage.getItem('best_brick')||'0');

function startGame() {
  document.getElementById('overlay').style.display='none';
  score=0; lives=3; level=1;
  updateHUD();
  buildLevel();
  resetBall();
  state='playing';
  cancelAnimationFrame(raf);
  loop();
}

function buildLevel() {
  bricks=[];
  const extra = Math.min(level-1,3); // 레벨 올라갈수록 행 추가
  const rows = BRICK_ROWS+extra;
  for(let r=0;r<rows;r++) for(let c=0;c<BRICK_COLS;c++){
    const hp = r===0?2:1; // 1행은 HP 2
    bricks.push({
      x: BRICK_OX+c*(BRICK_W+BRICK_GAP),
      y: BRICK_OY+r*(BRICK_H+BRICK_GAP),
      w: BRICK_W, h: BRICK_H,
      hp, maxHp:hp, alive:true,
      color: ROW_COLORS[r%ROW_COLORS.length],
      pts: ROW_PTS[r%ROW_PTS.length]
    });
  }
}

function resetBall() {
  pad = { x: W/2-PAD_W/2, vx:0 };
  const spd = 4.5+level*0.3;
  ball = { x:W/2, y:PAD_Y-BALL_R-2, vx:spd*(Math.random()<0.5?1:-1)*0.5, vy:-spd };
  launching=false;
}

function updateHUD() {
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent=lives;
  document.getElementById('lv2').textContent=level;
}

let mx=W/2;
c.addEventListener('mousemove', e=>{
  const r=c.getBoundingClientRect();
  mx=e.clientX-r.left;
});
c.addEventListener('touchmove', e=>{
  const r=c.getBoundingClientRect();
  mx=e.touches[0].clientX-r.left;
  e.preventDefault();
},{passive:false});
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft')  mx=Math.max(0,pad.x+PAD_W/2-12);
  if(e.key==='ArrowRight') mx=Math.min(W,pad.x+PAD_W/2+12);
});

function loop() {
  raf=requestAnimationFrame(loop);
  update(); draw();
}

function update() {
  // 패들 이동
  pad.x = Math.min(Math.max(mx-PAD_W/2, 0), W-PAD_W);

  // 공 이동
  ball.x+=ball.vx; ball.y+=ball.vy;

  // 벽 반사
  if(ball.x-BALL_R<0)  { ball.x=BALL_R;     ball.vx=Math.abs(ball.vx); }
  if(ball.x+BALL_R>W)  { ball.x=W-BALL_R;   ball.vx=-Math.abs(ball.vx); }
  if(ball.y-BALL_R<0)  { ball.y=BALL_R;      ball.vy=Math.abs(ball.vy); }

  // 패들 충돌
  if(ball.vy>0 && ball.y+BALL_R>=PAD_Y && ball.y-BALL_R<=PAD_Y+PAD_H
     && ball.x>=pad.x && ball.x<=pad.x+PAD_W) {
    const rel=(ball.x-(pad.x+PAD_W/2))/(PAD_W/2); // -1~1
    const spd=Math.hypot(ball.vx,ball.vy);
    ball.vx=rel*spd*1.2;
    ball.vy=-Math.sqrt(Math.max(spd*spd-ball.vx*ball.vx,4));
    ball.y=PAD_Y-BALL_R-1;
  }

  // 공 아래로 떨어짐
  if(ball.y-BALL_R>H) {
    lives--;
    updateHUD();
    if(lives<=0) { cancelAnimationFrame(raf); showEnd('😢','게임 오버',`점수: ${score}`); return; }
    resetBall();
  }

  // 벽돌 충돌
  for(const b of bricks) {
    if(!b.alive) continue;
    if(ball.x+BALL_R<b.x || ball.x-BALL_R>b.x+b.w) continue;
    if(ball.y+BALL_R<b.y || ball.y-BALL_R>b.y+b.h) continue;
    b.hp--;
    if(b.hp<=0) { b.alive=false; score+=b.pts*level; updateHUD(); }
    // 반사 방향 결정
    const ov_x=Math.min(ball.x+BALL_R,b.x+b.w)-Math.max(ball.x-BALL_R,b.x);
    const ov_y=Math.min(ball.y+BALL_R,b.y+b.h)-Math.max(ball.y-BALL_R,b.y);
    if(ov_x<ov_y) ball.vx*=-1; else ball.vy*=-1;
    break;
  }

  // 클리어
  if(bricks.every(b=>!b.alive)) {
    level++;
    if(score>best){best=score;localStorage.setItem('best_brick',best);}
    buildLevel(); resetBall();
    updateHUD();
  }
}

// ── 그리기 ────────────────────────────
function draw() {
  // 배경
  ctx.fillStyle='#0a001a'; ctx.fillRect(0,0,W,H);
  // 격자 글로우
  ctx.strokeStyle='rgba(180,0,255,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=30){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // 벽돌
  for(const b of bricks) {
    if(!b.alive) continue;
    ctx.save();
    ctx.shadowColor=b.color; ctx.shadowBlur=b.hp>1?12:6;
    ctx.fillStyle=b.hp>1?lighten(b.color):b.color;
    roundFill(b.x,b.y,b.w,b.h,5);
    // 하이라이트
    ctx.fillStyle='rgba(255,255,255,0.15)';
    roundFill(b.x+2,b.y+2,b.w-4,5,3);
    ctx.restore();
    if(b.hp>1) {
      ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='bold 10px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('★',b.x+b.w/2,b.y+b.h/2);
    }
  }

  // 패들
  ctx.save();
  ctx.shadowColor='#b400ff'; ctx.shadowBlur=20;
  const pg=ctx.createLinearGradient(pad.x,PAD_Y,pad.x,PAD_Y+PAD_H);
  pg.addColorStop(0,'#e040fb'); pg.addColorStop(1,'#7c00e6');
  ctx.fillStyle=pg;
  roundFill(pad.x,PAD_Y,PAD_W,PAD_H,PAD_H/2);
  ctx.fillStyle='rgba(255,255,255,0.25)';
  roundFill(pad.x+4,PAD_Y+2,PAD_W-8,4,3);
  ctx.restore();

  // 공
  ctx.save();
  ctx.shadowColor='#fff'; ctx.shadowBlur=18;
  const bg=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,BALL_R);
  bg.addColorStop(0,'#fff'); bg.addColorStop(1,'#cce4ff');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function roundFill(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}

function lighten(hex) {
  let n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&0xff)+60);
  const g=Math.min(255,((n>>8)&0xff)+60);
  const b=Math.min(255,(n&0xff)+60);
  return `rgb(${r},${g},${b})`;
}

function showEnd(emoji,title,sub) {
  if(score>best){best=score;localStorage.setItem('best_brick',best);}
  document.getElementById('ov-emoji').textContent=emoji;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-sub').textContent=sub;
  document.getElementById('ov-btn').textContent='다시 하기';
  document.getElementById('overlay').style.display='flex';
}

// 초기 배경
ctx.fillStyle='#0a001a'; ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
