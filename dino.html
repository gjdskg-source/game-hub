<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦕 Dino Run</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: #e8e8f0;
  overflow: hidden;
}
h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #7bed9f, #00d2ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#score-row {
  display: flex;
  gap: 32px;
  margin-bottom: 12px;
  font-size: 13px;
  color: #6b6b80;
}
#score-row span { color: #ffd32a; font-weight: 700; font-size: 15px; }

canvas {
  border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,0.08);
  display: block;
}
#tip {
  margin-top: 12px;
  font-size: 12px;
  color: #444466;
  text-align: center;
}
a.back {
  position: fixed;
  top: 16px; left: 20px;
  color: #6b6b80;
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}
a.back:hover { color: #e8e8f0; }
</style>
</head>
<body>

<a class="back" href="index.html">← 허브</a>

<h1>🦕 DINO RUN</h1>
<div id="score-row">
  <div>점수 <span id="sc">0</span></div>
  <div>최고 <span id="hi">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="tip">Space / ↑ / 탭 : 점프 &nbsp;|&nbsp; ↓ / S : 숙이기 &nbsp;|&nbsp; 모바일: 탭=점프, 스와이프 下=숙이기</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── 크기 설정 ──────────────────────────────────────────────
const W = Math.min(window.innerWidth - 32, 700);
const H = 200;
canvas.width = W;
canvas.height = H;

const GROUND = H - 30;
const DINO_X = 70;

// ── 상태 ──────────────────────────────────────────────────
let state = 'idle'; // idle | running | dead
let score = 0;
let hiScore = parseInt(localStorage.getItem('best_dino') || '0');
let frame = 0;
let speed = 5;
let nightMode = false;
let lastNightSwitch = 0;

// ── 공룡 ───────────────────────────────────────────────────
const dino = {
  y: GROUND,
  vy: 0,
  ducking: false,
  jumping: false,
  legFrame: 0,
  // normal: 40×44, ducking: 58×28
  get w() { return this.ducking ? 58 : 40; },
  get h() { return this.ducking ? 28 : 44; },
  get top() { return this.y - this.h; },
};

// ── 장애물 ─────────────────────────────────────────────────
let obstacles = [];
let nextObstacle = 80; // frames until next obstacle

// ── 구름 ───────────────────────────────────────────────────
let clouds = [
  { x: W * 0.6, y: 35, w: 60, h: 20 },
  { x: W * 0.9, y: 55, w: 45, h: 16 },
];

// ── 지면 선분 ──────────────────────────────────────────────
let groundBumps = [];
for (let i = 0; i < 60; i++) {
  groundBumps.push({ x: Math.random() * W * 2, h: Math.random() < 0.3 ? 3 : 1 });
}

// ── 색상 팔레트 ────────────────────────────────────────────
function pal() {
  return nightMode
    ? { bg: '#0d0d1a', ground: '#2a2a4a', dino: '#7c6ef5', cloud: '#2a2a5a', obstacle: '#8080ff', star: true }
    : { bg: '#1a1a2e', ground: '#334', dino: '#7bed9f', cloud: '#2a2a3a', obstacle: '#ff6b6b', star: false };
}

// ── 입력 ───────────────────────────────────────────────────
let downPressed = false;

function jump() {
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  if (!dino.jumping && !dino.ducking) {
    dino.vy = -13;
    dino.jumping = true;
  }
}
function duck(on) {
  downPressed = on;
  if (state !== 'running') return;
  if (on && dino.jumping) {
    dino.vy += 6; // fast fall
  }
  dino.ducking = on && !dino.jumping;
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Tab') { e.preventDefault(); jump(); }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); duck(true); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown' || e.code === 'KeyS') duck(false);
});

// モバイル touch
let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  jump();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 30) duck(false);
}, { passive: false });

canvas.addEventListener('click', () => jump());

// ── 게임 시작 ──────────────────────────────────────────────
function startGame() {
  state = 'running';
  score = 0;
  frame = 0;
  speed = 5;
  obstacles = [];
  nextObstacle = 60;
  dino.y = GROUND;
  dino.vy = 0;
  dino.ducking = false;
  dino.jumping = false;
  nightMode = false;
  lastNightSwitch = 0;
}

// ── 장애물 생성 ────────────────────────────────────────────
function spawnObstacle() {
  const r = Math.random();
  if (r < 0.65) {
    // 선인장 (단일/이중/삼중)
    const count = Math.random() < 0.5 ? 1 : Math.random() < 0.6 ? 2 : 3;
    const cw = 18 + Math.random() * 8;
    const ch = 35 + Math.random() * 20;
    obstacles.push({ type: 'cactus', x: W + 20, count, cw, ch });
  } else {
    // 프테로닥틸 (3단계 높이)
    const altitudes = [GROUND - 50, GROUND - 80, GROUND - 110];
    const alt = altitudes[Math.floor(Math.random() * altitudes.length)];
    obstacles.push({ type: 'ptero', x: W + 20, y: alt, wingUp: true, wingTimer: 0 });
  }
}

// ── AABB 충돌 ───────────────────────────────────────────────
function hitTest(ob) {
  const pad = 6;
  const dx = dino.x || DINO_X, dy = dino.top;
  const dw = dino.w - pad * 2, dh = dino.h - pad * 2;

  if (ob.type === 'cactus') {
    const gapBetween = 6;
    const totalW = ob.count * ob.cw + (ob.count - 1) * gapBetween;
    const ox = ob.x, ow = totalW, oy = GROUND - ob.ch, oh = ob.ch;
    return (dx + pad) < ox + ow && dx + dw + pad > ox &&
           dy + pad < oy + oh && dy + dh + pad > oy;
  } else {
    // ptero body: ~46×28
    const ox = ob.x, ow = 46, oy = ob.y, oh = 28;
    return (dx + pad) < ox + ow && dx + dw + pad > ox &&
           dy + pad < oy + oh && dy + dh + pad > oy;
  }
}

// ── 픽셀 드로잉 ────────────────────────────────────────────
function drawDino(x, y, ducking, legF, color) {
  ctx.fillStyle = color;
  if (!ducking) {
    // body
    ctx.fillRect(x + 8, y + 10, 24, 22);
    // neck
    ctx.fillRect(x + 20, y + 2, 14, 12);
    // head
    ctx.fillRect(x + 22, y, 18, 12);
    // eye
    ctx.fillStyle = pal().bg;
    ctx.fillRect(x + 34, y + 2, 4, 4);
    ctx.fillStyle = color;
    // tail
    ctx.fillRect(x, y + 14, 12, 8);
    ctx.fillRect(x + 2, y + 22, 8, 6);
    // arms
    ctx.fillRect(x + 24, y + 20, 6, 4);
    // legs
    const lOff = legF === 0 ? [0, 8] : legF === 1 ? [4, 2] : [-2, 10];
    ctx.fillRect(x + 14 + lOff[0], y + 32, 6, 12);
    ctx.fillRect(x + 22 + lOff[1], y + 32, 6, 12);
  } else {
    // ducking body (wider, lower)
    ctx.fillStyle = color;
    ctx.fillRect(x + 0, y + 0, 40, 18);
    ctx.fillRect(x + 28, y - 10, 18, 12);
    ctx.fillRect(x + 30, y - 14, 16, 8);
    // eye
    ctx.fillStyle = pal().bg;
    ctx.fillRect(x + 42, y - 12, 4, 4);
    ctx.fillStyle = color;
    // tail
    ctx.fillRect(x - 8, y + 4, 12, 6);
    // legs
    const lOff = legF === 0 ? [0, 8] : legF === 1 ? [4, 2] : [-2, 10];
    ctx.fillRect(x + 8 + lOff[0], y + 18, 6, 10);
    ctx.fillRect(x + 18 + lOff[1], y + 18, 6, 10);
  }
}

function drawCactus(ob, color) {
  ctx.fillStyle = color;
  const gap = 6;
  for (let i = 0; i < ob.count; i++) {
    const cx = ob.x + i * (ob.cw + gap);
    const cy = GROUND - ob.ch;
    // main body
    ctx.fillRect(cx + ob.cw * 0.3, cy, ob.cw * 0.4, ob.ch);
    // arms
    const armH = ob.ch * 0.35;
    ctx.fillRect(cx, cy + ob.ch * 0.2, ob.cw * 0.35, ob.cw * 0.3);
    ctx.fillRect(cx + ob.cw * 0.65, cy + ob.ch * 0.3, ob.cw * 0.35, ob.cw * 0.3);
    // arm tops
    ctx.fillRect(cx, cy + ob.ch * 0.1, ob.cw * 0.22, ob.cw * 0.3);
    ctx.fillRect(cx + ob.cw * 0.78, cy + ob.ch * 0.15, ob.cw * 0.22, ob.cw * 0.3);
  }
}

function drawPtero(ob, color) {
  ctx.fillStyle = color;
  const x = ob.x, y = ob.y;
  // body
  ctx.fillRect(x + 10, y + 10, 26, 16);
  // head
  ctx.fillRect(x + 28, y + 4, 18, 12);
  // beak
  ctx.fillRect(x + 44, y + 8, 10, 5);
  // eye
  ctx.fillStyle = pal().bg;
  ctx.fillRect(x + 38, y + 6, 4, 4);
  ctx.fillStyle = color;
  // wings
  if (ob.wingUp) {
    ctx.fillRect(x, y, 20, 12);
    ctx.fillRect(x + 16, y - 8, 12, 12);
    ctx.fillRect(x + 28, y + 2, 10, 10);
    ctx.fillRect(x + 38, y + 10, 8, 6);
  } else {
    ctx.fillRect(x, y + 12, 20, 12);
    ctx.fillRect(x + 16, y + 18, 12, 10);
    ctx.fillRect(x + 28, y + 16, 10, 8);
    ctx.fillRect(x + 38, y + 14, 8, 6);
  }
}

// ── stars ───────────────────────────────────────────────────
let stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * (GROUND - 40), r: Math.random() > 0.7 ? 2 : 1, flicker: Math.random() * Math.PI * 2 });
}

// ── 메인 루프 ──────────────────────────────────────────────
function update() {
  if (state !== 'running') return;

  frame++;
  score = Math.floor(frame * 0.1 * (speed / 5));

  // speed ramp
  if (frame % 400 === 0) speed = Math.min(speed + 0.5, 13);

  // day/night toggle every 700 frames
  if (frame - lastNightSwitch > 700) {
    nightMode = !nightMode;
    lastNightSwitch = frame;
  }

  // dino gravity
  if (dino.jumping || dino.y < GROUND) {
    dino.vy += 0.7;
    dino.y += dino.vy;
    if (dino.y >= GROUND) {
      dino.y = GROUND;
      dino.vy = 0;
      dino.jumping = false;
      dino.ducking = downPressed;
    }
  }

  // leg animation
  if (frame % 8 === 0) dino.legFrame = (dino.legFrame + 1) % 3;

  // obstacles
  nextObstacle--;
  if (nextObstacle <= 0) {
    spawnObstacle();
    // interval: shorter as speed increases
    nextObstacle = Math.max(30, Math.floor((80 - speed * 4) + Math.random() * 40));
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.x -= speed;
    if (ob.type === 'ptero') {
      ob.wingTimer++;
      if (ob.wingTimer % 18 === 0) ob.wingUp = !ob.wingUp;
    }
    if (ob.x < -120) {
      obstacles.splice(i, 1);
    } else if (hitTest(ob)) {
      state = 'dead';
      if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('best_dino', hiScore);
      }
    }
  }

  // clouds
  for (const c of clouds) {
    c.x -= speed * 0.3;
    if (c.x < -100) { c.x = W + 60; c.y = 20 + Math.random() * 50; }
  }

  // ground bumps
  for (const b of groundBumps) {
    b.x -= speed;
    if (b.x < -4) b.x += W * 2;
  }
}

function draw() {
  const p = pal();
  ctx.fillStyle = p.bg;
  ctx.fillRect(0, 0, W, H);

  // stars (night only)
  if (nightMode) {
    for (const s of stars) {
      const alpha = 0.5 + 0.5 * Math.sin(frame * 0.03 + s.flicker);
      ctx.fillStyle = `rgba(200,200,255,${alpha})`;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
  }

  // clouds
  ctx.fillStyle = p.cloud;
  for (const c of clouds) {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w * 0.5, c.h * 0.6, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - c.w * 0.25, c.y + 4, c.w * 0.3, c.h * 0.5, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + c.w * 0.25, c.y + 4, c.w * 0.3, c.h * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ground
  ctx.fillStyle = p.ground;
  ctx.fillRect(0, GROUND, W, 2);

  // ground bumps
  ctx.fillStyle = p.ground;
  for (const b of groundBumps) {
    if (b.x > 0 && b.x < W) {
      ctx.fillRect(b.x, GROUND + 4, 3, b.h);
    }
  }

  // obstacles
  for (const ob of obstacles) {
    if (ob.type === 'cactus') drawCactus(ob, p.obstacle);
    else drawPtero(ob, p.obstacle);
  }

  // dino
  const dinoColor = state === 'dead' ? '#ff4757' : p.dino;
  const drawY = dino.ducking ? dino.y - dino.h : dino.top;
  drawDino(DINO_X, drawY, dino.ducking, dino.jumping ? 0 : dino.legFrame, dinoColor);

  // score
  document.getElementById('sc').textContent = score;
  document.getElementById('hi').textContent = hiScore;

  // overlay messages
  if (state === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e8e8f0';
    ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('DINO RUN', W / 2, H / 2 - 14);
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#6b6b80';
    ctx.fillText('스페이스 / 클릭으로 시작', W / 2, H / 2 + 14);
    ctx.textAlign = 'left';
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff6b81';
    ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 16);
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#ffd32a';
    ctx.fillText('점수: ' + score + (score >= hiScore && score > 0 ? '  🏆 신기록!' : ''), W / 2, H / 2 + 6);
    ctx.fillStyle = '#6b6b80';
    ctx.fillText('스페이스 / 클릭으로 재시작', W / 2, H / 2 + 28);
    ctx.textAlign = 'left';
  }

  // day/night transition flash
  if (state === 'running' && frame - lastNightSwitch < 20) {
    const alpha = 0.15 * (1 - (frame - lastNightSwitch) / 20);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('hi').textContent = hiScore;
loop();
</script>
</body>
</html>
